<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragrafos</title>
</head>
<body>
    <h1>Paragrafos e quebra de linhas</h1>
    <hr>
    <p>Você pode escrever um paragrafo de qualquer jeito
        por tanto que esteja entre o P
    </p>
    <p>Se precisar quebrar uma linha
        em seu codigo, utiliza-se a tag
        <br> para efetuar a quebra de linha em seu codigo
        <br>
        Utilizando simbolos: &reg; &copy; &trade; &euro; &pound; &yen; &cent; &delta; &uarr;
        <br>
        Utilizando emogis: &#128514 &#129302
    </p>
</body>
</html>
