<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Integrando HTML ao flask</title>
</head>
<body>
 <h1 style = "text-align: center;">Adicionar frutas a uma lista</h1>
 <hr>
 <ol>
    {% for Fruta in frutas %}
        <li>{{Fruta}}</li>
    {% endfor %}
   <form action="{{url_for('homepage')}}" method="post">
    <label>frutas</label>
    <input type="text" name = "frutas" >
    <button>Adicionar</button>
   </form>
</ol>
</body>
</html>
