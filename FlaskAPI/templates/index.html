<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Integrando HTML ao flask</title>
</head>
<body>
 <h1>Notas dos alunos</h1>
 <hr>
    {% for chave, valor in notas.items() %}
        <details>
            <summary>{{chave}}</summary>
            <p>{{valor}}</p>
        </details>
    {% endfor %}
</body>
</html>
