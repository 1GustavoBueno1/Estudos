{% extends 'base.html' %}
{% block conteudo %}
 <h1 style = "text-align: center;">Adicionar frutas a uma lista</h1>
 <hr>
 <ul class="list-group list-group-flush">
    {% for Fruta in frutas %}
        <li class="list-group-item">{{Fruta}}</li>
    {% endfor %}
   <form action="{{url_for('pagina1')}}" method="post">
    <div class = "form-group">
        <label for = "exemplofrutas">frutas</label>
        <input class = "form-control w-50" id = "exemplofrutas" type = "text" name = "frutas" placeholder="Informe o nome de uma fruta" required >
    </div>
    <button class = "btn btn-primary mt-3">Adicionar</button>
   </form>
</ul>
{% endblock conteudo %}
