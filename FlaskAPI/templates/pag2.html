{% extends 'base.html' %}
{% block conteudo %}
   <h1 style = "text-align: center;">Notas do ano letivo</h1>
   <hr>
        {% for registro in registros %}
        <details>
            <summary>{{registro.Aluno}}</summary>
            <p>{{registro.Nota}}</p>
        </details>
        {% endfor %}
        <form action = "{{url_for('pagina2')}}" method = "post">
            <div class = "form-group">
            <label for = "exemploaluno" class = "ms-3">Aluno</label>
            <input class = "form-control w-25 ms-3" id = "exemploaluno" type="text" name = "Aluno"  placeholder="Informe o nome do Aluno" required >
        </div>
        <div class="form-group">
            <label for = "exemplonotas" class = "ms-3">Nota</label>
            <input class = "form-control w-25 ms-3" type="text" name = "Nota" placeholder="Informe a nota do aluno" required>
        </div>
        <button class = "btn btn-primary mt-3 ms-3">Adicionar</button>
        </form>
{% endblock conteudo %}
